<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kutumbly — Indian Family Personal OS</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F3F4F6;
      color: #111827;
      min-height: 100vh;
    }

    /* ─── CSS Variables (Light Mode) ───────────────────────────── */
    :root {
      --bg-primary:    #FFFFFF;
      --bg-secondary:  #F9FAFB;
      --bg-tertiary:   #F3F4F6;
      --bg-success:    #ECFDF5;
      --bg-warning:    #FFFBEB;
      --bg-danger:     #FEF2F2;
      --bg-info:       #EFF6FF;
      --bg-secondary-badge: #F3F4F6;

      --text-primary:   #111827;
      --text-secondary: #6B7280;
      --text-tertiary:  #9CA3AF;
      --text-success:   #065F46;
      --text-warning:   #92400E;
      --text-danger:    #991B1B;
      --text-info:      #1E40AF;

      --border-light:   #E5E7EB;
      --border-medium:  #D1D5DB;
      --border-success: #6EE7B7;
      --border-warning: #FCD34D;
      --border-danger:  #FECACA;
      --border-info:    #BFDBFE;

      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    /* ─── Dark Mode ─────────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary:    #1F2937;
        --bg-secondary:  #111827;
        --bg-tertiary:   #0F172A;
        --bg-success:    #064E3B;
        --bg-warning:    #78350F;
        --bg-danger:     #7F1D1D;
        --bg-info:       #1E3A8A;
        --bg-secondary-badge: #374151;

        --text-primary:   #F9FAFB;
        --text-secondary: #9CA3AF;
        --text-tertiary:  #6B7280;
        --text-success:   #A7F3D0;
        --text-warning:   #FDE68A;
        --text-danger:    #FECACA;
        --text-info:      #BFDBFE;

        --border-light:   #374151;
        --border-medium:  #4B5563;
        --border-success: #065F46;
        --border-warning: #92400E;
        --border-danger:  #991B1B;
        --border-info:    #1E40AF;
      }
      body { background: var(--bg-tertiary); color: var(--text-primary); }
    }

    /* ─── App Shell ─────────────────────────────────────────────── */
    #kutumbly-app {
      max-width: 880px;
      margin: 0 auto;
      background: var(--bg-tertiary);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 100vh;
    }

    /* ─── Header ────────────────────────────────────────────────── */
    .app-header {
      background: var(--bg-primary);
      padding: 11px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header-left { display: flex; align-items: center; gap: 10px; }
    .app-logo { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.5px; }
    .app-family { font-size: 13px; color: var(--text-secondary); }
    .app-header-right { display: flex; align-items: center; gap: 6px; }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--bg-success);
      border: 1.5px solid var(--text-success);
    }
    .status-label { font-size: 11px; color: var(--text-tertiary); }

    /* ─── Tab Navigation ────────────────────────────────────────── */
    #k-tabs {
      display: flex;
      overflow-x: auto;
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-light);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      position: sticky;
      top: 45px;
      z-index: 99;
    }
    #k-tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      border: none;
      background: transparent;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active {
      font-weight: 500;
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }

    /* ─── Module Content Area ───────────────────────────────────── */
    #k-view { padding: 16px; }

    /* ─── Cards ─────────────────────────────────────────────────── */
    .card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border-light);
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .meta-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 10px 12px;
    }

    /* ─── Stats Grid ─────────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-cell { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 10px 12px; }
    .stat-label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 500; }

    /* ─── Section Heading ────────────────────────────────────────── */
    .section-head {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 14px 0 8px;
    }

    /* ─── Module Header ──────────────────────────────────────────── */
    .mod-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .mod-title { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .mod-sub   { font-size: 12px; color: var(--text-tertiary); }

    /* ─── Badges ─────────────────────────────────────────────────── */
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-md);
    }
    .badge-success  { background: var(--bg-success);  color: var(--text-success); }
    .badge-warning  { background: var(--bg-warning);  color: var(--text-warning); }
    .badge-danger   { background: var(--bg-danger);   color: var(--text-danger); }
    .badge-info     { background: var(--bg-info);     color: var(--text-info); }
    .badge-secondary{ background: var(--bg-secondary-badge); color: var(--text-secondary); }

    /* ─── Buttons ─────────────────────────────────────────────────── */
    .btn {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-medium);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s;
    }
    .btn:hover  { background: var(--bg-secondary); }
    .btn-danger { border-color: var(--border-danger); color: var(--text-danger); }
    .btn-danger:hover { background: var(--bg-danger); }

    /* ─── Toggle Switch ───────────────────────────────────────────── */
    .toggle {
      width: 42px; height: 24px;
      border-radius: 12px;
      border: 0.5px solid var(--border-medium);
      display: flex;
      align-items: center;
      padding: 2px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .toggle.on  { background: var(--bg-success);  border-color: var(--border-success); }
    .toggle.off { background: var(--bg-secondary); border-color: var(--border-medium); }
    .toggle-thumb {
      width: 19px; height: 19px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .toggle.on  .toggle-thumb { transform: translateX(18px); }
    .toggle.off .toggle-thumb { transform: translateX(0); }

    /* ─── Avatar ─────────────────────────────────────────────────── */
    .avatar {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 500;
    }

    /* ─── List Rows ───────────────────────────────────────────────── */
    .list-row {
      display: flex;
      align-items: center;
      padding: 9px 0;
      border-bottom: 0.5px solid var(--border-light);
    }
    .list-row:last-child { border-bottom: none; }

    /* ─── Setting Row ─────────────────────────────────────────────── */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 0.5px solid var(--border-light);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 13px; color: var(--text-primary); }
    .setting-sub   { font-size: 11px; color: var(--text-tertiary); }

    /* ─── Select ─────────────────────────────────────────────────── */
    select {
      font-size: 12px;
      padding: 4px 8px;
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: inherit;
      cursor: pointer;
    }

    /* ─── Checkbox ───────────────────────────────────────────────── */
    .check-box {
      width: 16px; height: 16px;
      border-radius: 4px;
      border: 1.5px solid var(--border-medium);
      flex-shrink: 0;
    }
    .check-box.done {
      background: var(--bg-success);
      border: none;
    }

    /* ─── Dot Separator ──────────────────────────────────────────── */
    .dot-sep {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border-medium);
      display: inline-block;
    }

    /* ─── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 480px) {
      #kutumbly-app { border-radius: 0; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div id="kutumbly-app">

  <!-- ── App Header ── -->
  <header class="app-header">
    <div class="app-header-left">
      <span class="app-logo">kutumbly</span>
      <span class="dot-sep"></span>
      <span class="app-family">Sharma Parivar</span>
    </div>
    <div class="app-header-right">
      <span class="status-label">offline · AES-256</span>
      <div class="status-dot"></div>
    </div>
  </header>

  <!-- ── Tab Navigation ── -->
  <nav id="k-tabs"></nav>

  <!-- ── Module Content ── -->
  <main id="k-view"></main>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   KUTUMBLY UI — All Modules
   Stack: Vanilla JS + CSS Variables
   Author: AITDL Network (aitdl.in)
   Version: 1.0-alpha
   ─────────────────────────────────────────────────────────────
   MODULES
     home      Dashboard
     diary     Diary
     tasks     Tasks
     money     Money
     nevata    Nevata (Gift tracker)
     health    Health
     invest    Invest
     grocery   Grocery
     staff     HomeStaff (घर का स्टाफ)
     setup     Setup & Help  ← always visible, never hideable
   ═══════════════════════════════════════════════════════════════ */

/* ── State ── */
let activeModule = 'home';
let hiddenModules = new Set(); // module ids toggled off in Setup

/* ── Module Registry ── */
const ALL_MODULES = [
  { id: 'home',    label: 'Home',        desc: 'Family activity dashboard' },
  { id: 'diary',   label: 'Diary',       desc: 'Personal & family journal' },
  { id: 'tasks',   label: 'Tasks',       desc: 'To-do & checklists' },
  { id: 'money',   label: 'Money',       desc: 'INR income & expenses' },
  { id: 'nevata',  label: 'Nevata',      desc: 'Gift & occasion tracker' },
  { id: 'health',  label: 'Health',      desc: 'Family health records' },
  { id: 'invest',  label: 'Invest',      desc: 'Portfolio & investments' },
  { id: 'grocery', label: 'Grocery',     desc: 'Shopping list & pantry' },
  { id: 'staff',   label: 'HomeStaff',   desc: 'Ghar ka staff management' },
  { id: 'setup',   label: 'Setup & Help',desc: 'Configuration & settings' },
];

/* Modules that can never be hidden */
const PERMANENT_MODULES = new Set(['home', 'setup']);

/* ── HTML Helpers ── */
const H = {

  badge(text, variant) {
    return `<span class="badge badge-${variant}">${text}</span>`;
  },

  btn(text, extraClass = '') {
    return `<button class="btn ${extraClass}">${text}</button>`;
  },

  avatar(initials, variant, size = 34) {
    return `<div class="avatar" style="width:${size}px;height:${size}px;background:var(--bg-${variant});font-size:${Math.round(size*0.35)}px;color:var(--text-${variant});">${initials}</div>`;
  },

  stats(items) {
    // items: Array of [label, value, colorVariant]
    return `<div class="stats-grid">${
      items.map(([l, v, s]) => `
        <div class="stat-cell">
          <div class="stat-label">${l}</div>
          <div class="stat-value" style="color:var(--text-${s || 'primary'});">${v}</div>
        </div>`).join('')
    }</div>`;
  },

  modHeader(title, subtitle, btnLabel = '') {
    return `<div class="mod-header">
      <div>
        <div class="mod-title">${title}</div>
        <div class="mod-sub">${subtitle}</div>
      </div>
      ${btnLabel ? H.btn(btnLabel) : ''}
    </div>`;
  },

  sectionHead(text) {
    return `<div class="section-head">${text}</div>`;
  },

  toggle(id, isOn) {
    return `<div class="toggle ${isOn ? 'on' : 'off'}" onclick="toggleSetting('${id}')">
      <div class="toggle-thumb"></div>
    </div>`;
  },

  settingRow(label, sub, rightHTML) {
    return `<div class="setting-row">
      <div>
        <div class="setting-label">${label}</div>
        ${sub ? `<div class="setting-sub">${sub}</div>` : ''}
      </div>
      <div>${rightHTML}</div>
    </div>`;
  },

};

/* ═══════════════════════════════════════════════════════════════
   MODULE VIEWS
   Each function returns an HTML string.
   Replace mock data with real API/IndexedDB calls.
   ═══════════════════════════════════════════════════════════════ */
const VIEWS = {

  /* ─── HOME ─────────────────────────────────────────────────── */
  home() {
    const activity = [
      { member: 'SU', name: 'Sunita',  text: 'Added a diary entry',       time: '2m ago' },
      { member: 'RA', name: 'Rahul',   text: 'Completed 2 tasks',         time: '1h ago' },
      { member: 'ME', name: 'Meena',   text: 'Marked attendance',         time: '3h ago' },
      { member: 'PR', name: 'Priya',   text: 'Logged a health note',      time: '5h ago' },
      { member: 'RS', name: 'Ramesh',  text: 'Added ₹2,000 expense',      time: '6h ago' },
    ];
    return `
      ${H.modHeader('Good morning, Ramesh ji', 'Monday, 13 Apr 2026', '+ Add')}
      ${H.stats([
        ['Tasks due today', '3',      'warning'],
        ['Money this month','₹18,420','success'],
        ['Staff present',   '2/2',    'success'],
        ['Upcoming events', '4',      'info'],
      ])}
      ${H.sectionHead('Family activity')}
      <div class="card">
        ${activity.map((a, i) => `
          <div class="list-row" style="${i === 0 ? 'padding-top:0;' : ''}">
            ${H.avatar(a.member, 'secondary', 28)}
            <span style="font-size:13px;color:var(--text-primary);flex:1;margin-left:10px;">${a.name} — ${a.text}</span>
            <span style="font-size:11px;color:var(--text-tertiary);">${a.time}</span>
          </div>`).join('')}
      </div>`;
  },

  /* ─── DIARY ────────────────────────────────────────────────── */
  diary() {
    const entries = [
      { member: 'SU', name: 'Sunita', date: 'Today',     text: 'Priya got 94% in boards! Puja karni chahiye ghar mein...' },
      { member: 'RS', name: 'Ramesh', date: 'Yesterday', text: 'Office mein bade project ki meeting thi. Raat ko thoda late hua...' },
      { member: 'RA', name: 'Rahul',  date: '12 Apr',    text: 'Dost ke saath cricket khela. Team ne jeet liya finally.' },
      { member: 'PR', name: 'Priya',  date: '11 Apr',    text: 'Boards ke baad bahut relaxed feel ho raha hai. Sab theek ho gaya!' },
    ];
    return `
      ${H.modHeader('Diary', 'Personal & family journal', '+ New entry')}
      ${H.stats([
        ['This month', '12 entries', ''],
        ['This week',  '3 entries',  ''],
        ['Members writing', '3/4',   ''],
      ])}
      <div class="card">
        ${entries.map((e, i) => `
          <div style="padding:10px 0;${i ? 'border-top:0.5px solid var(--border-light);' : ''}">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <div style="display:flex;align-items:center;gap:6px;">
                ${H.avatar(e.member, 'info', 22)}
                <span style="font-size:13px;font-weight:500;color:var(--text-primary);">${e.name}</span>
              </div>
              <span style="font-size:11px;color:var(--text-tertiary);">${e.date}</span>
            </div>
            <p style="font-size:13px;color:var(--text-secondary);line-height:1.5;">${e.text}</p>
          </div>`).join('')}
      </div>`;
  },

  /* ─── TASKS ────────────────────────────────────────────────── */
  tasks() {
    const categories = {
      Home: [
        ['Book LPG cylinder',      'Ramesh',  'Today',  false],
        ['Call plumber for kitchen','Sunita',  '15 Apr', false],
        ['Clean car on Sunday',    'Rahul',   'Sun',    true ],
      ],
      Work: [
        ['Submit tax documents',   'Ramesh',  '17 Apr', false],
        ['Update office address',  'Ramesh',  'Done',   true ],
      ],
      School: [
        ["Fee payment — Priya",    'Sunita',  '20 Apr', false],
        ['Parent-teacher meeting', 'Ramesh',  '22 Apr', false],
      ],
    };
    return `
      ${H.modHeader('Tasks', 'Family to-do list', '+ Add task')}
      ${H.stats([
        ['Pending',    '7', 'warning'],
        ['Done today', '3', 'success'],
        ['Overdue',    '1', 'danger' ],
      ])}
      ${Object.entries(categories).map(([cat, rows]) => `
        ${H.sectionHead(cat)}
        <div class="card">
          ${rows.map(([text, by, due, done], i) => `
            <div class="list-row" style="${i === 0 ? 'padding-top:0;' : ''}">
              <div class="check-box ${done ? 'done' : ''}" style="margin-right:10px;"></div>
              <span style="font-size:13px;color:var(--text-${done ? 'tertiary' : 'primary'});${done ? 'text-decoration:line-through;' : ''}flex:1;">${text}</span>
              <span style="font-size:11px;color:var(--text-tertiary);margin-right:8px;">${by}</span>
              ${H.badge(due, due === 'Done' ? 'success' : due === 'Today' ? 'warning' : 'secondary')}
            </div>`).join('')}
        </div>`).join('')}`;
  },

  /* ─── MONEY ────────────────────────────────────────────────── */
  money() {
    const txns = [
      ['Grocery — BigBazaar', 'Sunita', 'Today',  '-₹2,340',  'danger'],
      ['Salary credited',     'Ramesh', '1 Apr',  '+₹85,000', 'success'],
      ['School fee — Priya',  'Sunita', '2 Apr',  '-₹8,500',  'danger'],
      ['Electricity bill',    'Ramesh', '3 Apr',  '-₹1,240',  'danger'],
      ['Rental income',       'Ramesh', '5 Apr',  '+₹12,000', 'success'],
      ['Meena salary',        'Ramesh', '5 Apr',  '-₹6,000',  'danger'],
      ['Ramkishore salary',   'Ramesh', '5 Apr',  '-₹8,500',  'danger'],
    ];
    return `
      ${H.modHeader('Money', 'INR · April 2026', '+ Add')}
      ${H.stats([
        ['Balance',       '₹1,24,500', ''],
        ['Income',        '₹85,000',   'success'],
        ['Expenses',      '₹18,420',   'danger'],
        ['Savings rate',  '78%',       'info'],
      ])}
      ${H.sectionHead('Recent transactions')}
      <div class="card">
        ${txns.map(([label, by, date, amt, s], i) => `
          <div class="list-row" style="${i === 0 ? 'padding-top:0;' : ''}">
            <div style="flex:1;">
              <div style="font-size:13px;color:var(--text-primary);">${label}</div>
              <div style="font-size:11px;color:var(--text-tertiary);">${by} · ${date}</div>
            </div>
            <span style="font-size:13px;font-weight:500;color:var(--text-${s});">${amt}</span>
          </div>`).join('')}
      </div>`;
  },

  /* ─── NEVATA ───────────────────────────────────────────────── */
  nevata() {
    const upcoming = [
      ['Amit bhaiya ki shaadi', '28 Apr 2026', 'Shaadi',   '₹5,000'  ],
      ['Ma ji ka birthday',     '2 May 2026',  'Birthday', '₹2,000'  ],
      ['Rakshabandhan',         '9 Aug 2026',  'Tyohaar',  '—'       ],
      ['Diwali gifting',        'Oct 2026',    'Tyohaar',  '~₹15,000'],
    ];
    return `
      ${H.modHeader('Nevata', 'Gift & occasion tracker', '+ Add event')}
      ${H.stats([
        ['Upcoming',        '4',        'warning'],
        ['Given (YTD)',      '₹28,500',  ''],
        ['Received (YTD)',   '₹34,000',  'success'],
        ["Thank-you's due",  '2',        'danger'],
      ])}
      ${H.sectionHead('Upcoming occasions')}
      <div class="card" style="margin-bottom:12px;">
        ${upcoming.map(([name, date, cat, amt], i) => `
          <div class="list-row" style="${i === 0 ? 'padding-top:0;' : ''}">
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:500;color:var(--text-primary);">${name}</div>
              <div style="font-size:11px;color:var(--text-tertiary);">${date}</div>
            </div>
            ${H.badge(cat, 'info')}
            <span style="font-size:13px;font-weight:500;color:var(--text-primary);margin-left:10px;">${amt}</span>
          </div>`).join('')}
      </div>
      ${H.sectionHead('Recently recorded')}
      <div class="card">
        ${[
          ['Given: Raju uncle wedding (Dec 25)',  '₹3,100', ''],
          ['Received: New Year from Sharma chacha','₹2,100','success'],

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION & RENDERING
   ═══════════════════════════════════════════════════════════════ */

function renderTabs() {
  const tabsEl = document.getElementById('k-tabs');
  tabsEl.innerHTML = ALL_MODULES
    .filter(m => !hiddenModules.has(m.id))
    .map(m => `
      <button
        class="tab-btn ${m.id === activeModule ? 'active' : ''}"
        onclick="setModule('${m.id}')">
        ${m.label}
      </button>`).join('');
}

function renderView() {
  const viewFn = VIEWS[activeModule];
  document.getElementById('k-view').innerHTML = viewFn ? viewFn() : '<p>Module not found.</p>';
}

function setModule(id) {
  activeModule = id;
  renderTabs();
  renderView();
  // Scroll tab into view
  const activeBtn = document.querySelector('.tab-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
}

/* ── Toggle handler (Setup toggles) ── */
function toggleSetting(id) {
  if (id.startsWith('mod__')) {
    // Module visibility toggle
    const modId = id.replace('mod__', '');
    if (PERMANENT_MODULES.has(modId)) return; // safety guard
    if (hiddenModules.has(modId)) {
      hiddenModules.delete(modId);
    } else {
      hiddenModules.add(modId);
      if (activeModule === modId) { activeModule = 'home'; }
    }
    renderTabs();
  }
  // Re-render setup view to reflect new toggle state
  if (activeModule === 'setup') renderView();
}

/* ── Boot ── */
window.setModule   = setModule;
window.toggleSetting = toggleSetting;

renderTabs();
renderView();
</script>
